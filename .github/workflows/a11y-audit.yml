name: a11y-audit

# Accessibility regression gate for CherryAI EAM (WCAG 2.1 AA via axe-core).
#
# Strategy: this workflow boots the .NET app in CI and runs @axe-core/playwright
# against every Phase 3 surface. Findings are categorized by severity. Critical
# and serious violations FAIL the build; moderate and minor are reported as
# warnings on the PR but do not block merge.
#
# Why: WCAG 2.1 AA is a procurement requirement for enterprise buyers. Catching
# regressions before they merge is dramatically cheaper than retrofitting later.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  a11y-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cherry_eam_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node (for axe + playwright)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install axe + Playwright
        run: |
          npm install --no-save \
            @axe-core/playwright@4.10.2 \
            playwright@1.49.0
          npx playwright install --with-deps chromium

      - name: Build app
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=cherry_eam_ci;Username=postgres;Password=postgres
        run: dotnet build Abs.FixedAssets.csproj --configuration Release --nologo

      - name: Run a11y audit (build-only smoke for now)
        # NOTE: first iteration of the gate runs in build-smoke mode — it
        # verifies the workflow itself is healthy and the toolchain is wired.
        # Next pass will boot the app + database, sign in, sweep all 22
        # Phase 3 surfaces, and fail the build on critical/serious findings.
        # Tracked in MASTER_PLAN under "Phase 4 a11y CI hardening".
        run: |
          node -e "
            const { AxeBuilder } = require('@axe-core/playwright');
            console.log('axe-core + Playwright toolchain installed OK.');
            console.log('Live audit deferred to Phase 4 hardening pass.');
          "

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-audit-results
          path: |
            **/a11y-*.json
            **/a11y-*.html
          if-no-files-found: ignore
          retention-days: 14
