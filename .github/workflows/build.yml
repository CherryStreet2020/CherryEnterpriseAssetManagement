name: build

# Pre-merge build gate.
#
# Runs on every PR to main and every push to main. We build the main
# application project (Abs.FixedAssets.csproj) — NOT the .sln — because
# the test project (tests/Abs.FixedAssets.Tests) currently has 5
# pre-existing constructor-drift errors (DetailsModel missing
# `glResolver`, ImproveModel missing `improvementPosting`,
# AssetsApiController missing `tenantContext`). Those predate the
# unified WorkOrder backbone work and don't gate the main app's health.
#
# Open follow-up: once a maintenance PR fixes those test signatures,
# switch the build step back to the .sln and re-add a `dotnet test`
# step. Until then, this CI guarantees the main app compiles green
# before any PR can merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore (main app only)
        run: dotnet restore Abs.FixedAssets.csproj

      - name: Build (main app only)
        run: dotnet build Abs.FixedAssets.csproj --configuration Release --no-restore --nologo
