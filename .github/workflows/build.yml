name: build

# Pre-merge build gate.
#
# Builds the full solution (main app + test project) and runs xUnit.
# The constructor-drift errors that previously blocked the test
# project were fixed in the maintenance PR alongside this workflow
# update; 9 stale tests are explicitly `[Fact(Skip=...)]` with TODO
# messages for the next maintenance pass.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Abs.FixedAssets.sln

      - name: Build
        run: dotnet build Abs.FixedAssets.sln --configuration Release --no-restore --nologo

      - name: Test
        run: dotnet test Abs.FixedAssets.sln --configuration Release --no-build --nologo
