name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Abs.FixedAssets.sln

      - name: Build
        run: dotnet build Abs.FixedAssets.sln --configuration Release --no-restore --nologo

      - name: Test
        run: dotnet test Abs.FixedAssets.sln --configuration Release --no-build --nologo --logger "console;verbosity=normal" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/test-results.trx'
          if-no-files-found: ignore
